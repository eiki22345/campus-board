name: テスト

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: campus_board_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.2 セットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, curl, zip, gd, mysql, bcmath, intl
          coverage: none

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Composer キャッシュ
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer インストール
        run: composer install --no-interaction --prefer-dist

      - name: npm インストール
        run: npm ci

      - name: フロントエンドビルド
        run: npm run build

      - name: 環境設定
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: テスト用DB設定
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=campus_board_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: ng_words設定
        run: cp config/ng_words.php.example config/ng_words.php

      - name: マイグレーション
        run: php artisan migrate --force

      - name: テスト実行
        run: php artisan test
